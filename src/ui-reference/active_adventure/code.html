<style>
    body {
      background-color: #0A0A0A;
      color: #e5e2e1;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .amber-glow {
      box-shadow: 0 0 60px 10px rgba(255, 149, 0, 0.15);
    }
    .camera-glow {
      box-shadow: 0 0 40px 5px rgba(255, 149, 0, 0.3);
    }
    .light-leak {
      background: radial-gradient(circle at 50% -20%, rgba(255, 149, 0, 0.08) 0%, transparent 70%);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen light-leak">
<!-- Top Navigation (Active Journey State) -->
<header class="flex justify-between items-center w-full px-margin-page pt-4 pb-2 z-10">
<button class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center hover:bg-surface-variant/20 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface" data-icon="close">close</span>
</button>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-primary mb-1" data-icon="light_mode" style="font-variation-settings: 'FILL' 1;">light_mode</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Dog Beach</span>
</div>
<button class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center hover:bg-surface-variant/20 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface" data-icon="more_horiz">more_horiz</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-page">
<!-- Title & Location -->
<div class="text-center mb-12">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Coronado Dog Beach</h1>
<div class="flex items-center justify-center gap-1 text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]" data-icon="location_on">location_on</span>
<span class="font-body-md text-body-md">Coronado, CA</span>
</div>
</div>
<!-- Adventure Timer -->
<div class="relative flex flex-col items-center mb-16 amber-glow">
<div class="font-display-time text-display-time text-primary tabular-nums tracking-wider">
        00:24:18
      </div>
<div class="font-label-sm text-label-sm text-on-surface-variant mt-2 tracking-[0.1em] uppercase">
        Time on Adventure
      </div>
</div>
<!-- Interaction Hub -->
<div class="flex flex-col items-center gap-stack-lg mb-8">
<button class="group relative w-24 h-24 rounded-full bg-surface-container-high border border-white/10 flex items-center justify-center camera-glow active:scale-95 transition-all duration-200">
<div class="absolute inset-0 rounded-full bg-primary/10 blur-xl opacity-50 group-hover:opacity-80 transition-opacity"></div>
<span class="material-symbols-outlined text-[40px] text-primary" data-icon="photo_camera" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</button>
<div class="text-center">
<div class="font-body-lg text-body-lg text-on-surface mb-1">Capture a moment</div>
<div class="font-headline-md text-headline-md text-primary">+10 XP</div>
</div>
</div>
</main>
<!-- Action Controls -->
<footer class="w-full px-margin-page pb-12 pt-4">
<div class="flex gap-4 w-full">
<!-- Pause Button -->
<button class="flex-1 py-4 px-6 rounded-lg bg-surface-container-highest/50 border border-white/5 flex items-center justify-center gap-2 hover:bg-surface-container-highest transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface" data-icon="pause" style="font-variation-settings: 'FILL' 1;">pause</span>
<span class="font-headline-md text-body-lg text-on-surface">Pause</span>
</button>
<!-- Finish Button -->
<button class="flex-[1.5] py-4 px-6 rounded-lg bg-gradient-to-r from-[#FF9500] to-[#FF5E00] flex items-center justify-center shadow-[0_4px_20px_rgba(255,94,0,0.3)] hover:brightness-110 transition-all active:scale-95 duration-200">
<span class="font-headline-md text-body-lg text-on-secondary font-bold">Finish</span>
</button>
</div>
</footer>
<!-- Background Imagery Context -->
<div class="fixed inset-0 -z-10 overflow-hidden">
<div class="absolute inset-0 bg-black/60 z-0"></div>
<img class="w-full h-full object-cover opacity-30 grayscale-[0.2]" data-alt="A cinematic, low-angle shot of a golden retriever standing on a wide sandy beach at sunset. The lighting is warm and golden, casting long shadows across the textured sand. The background features soft, rolling waves and a distant pier silhouette, all under a deep amber sky. The overall visual style is premium and lifestyle-focused, maintaining a dark and intimate mood that complements the charcoal and amber UI." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC3sNWA-72d5eEgXKl201U87Ir_RTy5qtDNnAHONna0EnT5Iqir1o0d5Adw3egy_V2wqjHky3e5QogAk7hZ-3PHrK_fGVafWty6KqG7d5Q34RoeyMzA3FN88UX62vI5SG7KzWkjgo-xhp-jopdGUBOafrDULVqtd9XBrDQwoVYQL1_nh2fIxd4mPJ3NZt-waeE_ZFvCDdR8DtQw1u77xaWqqwIl-mpvSFaNEZvaR-TUaSVySTf_CE_sGEZW8uHL1tAYsF6dYeY7QutB"/>
</div>
</body></html>
