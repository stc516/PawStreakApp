<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PawStreak - Write a Memory</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                  "background": "#0A0A0A",
                  "primary": "#ffbd7f",
                  "outline-variant": "#554334",
                  "tertiary-container": "#e9a035",
                  "primary-container": "#ff9500",
                  "on-secondary-fixed": "#370e00",
                  "surface-container-high": "#2a2a2a",
                  "on-tertiary": "#462a00",
                  "surface-container-highest": "#353534",

                  "on-background": "#e5e2e1",

          "borderRadius": {

          },
          "spacing": {
                  "margin-page": "24px",
                  "stack-lg": "24px",
                  "stack-md": "16px",
                  "card-padding": "20px",
                  "stack-sm": "8px",
                  "gutter-grid": "16px"
          },
          "fontFamily": {
                  "headline-md": ["Inter"],
                  "body-md": ["Inter"],

          "fontSize": {

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .amber-glow {
      box-shadow: 0 0 25px -5px rgba(255, 149, 0, 0.4);
    }
    .subtle-mesh {
      background-image: radial-gradient(at 0% 0%, rgba(255, 149, 0, 0.05) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, rgba(255, 94, 0, 0.05) 0px, transparent 50%);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md min-h-screen selection:bg-primary/30">
<!-- TopAppBar -->
<header class="bg-background dark:bg-background flex justify-between items-center w-full px-margin-page pt-4 pb-2 fixed top-0 z-50">
<div class="flex items-center gap-stack-md">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low hover:bg-surface-variant/10 transition-colors">
<span class="material-symbols-outlined text-on-surface">close</span>
</button>
<h1 class="text-headline-md font-headline-md font-bold text-primary dark:text-primary">New Memory</h1>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">history_edu</span>
</div>
</header>
<main class="pt-24 pb-32 px-margin-page max-w-lg mx-auto subtle-mesh min-h-screen">
<!-- Memory Entry Area -->
<section class="space-y-stack-lg">
<!-- Narrative Input -->
<div class="relative group">
<div class="absolute -inset-0.5 bg-gradient-to-r from-primary/20 to-secondary-container/20 rounded-xl blur opacity-30 group-focus-within:opacity-100 transition duration-500"></div>
<div class="relative bg-surface-container-low border border-white/5 rounded-xl p-card-padding">
<textarea class="w-full bg-transparent border-none focus:ring-0 text-body-lg font-body-lg min-h-[160px] resize-none text-on-surface placeholder:text-on-surface-variant/50" placeholder="Write a memory..."></textarea>
</div>
</div>
<!-- Quick Actions -->
<div class="flex flex-wrap gap-stack-sm">
<button class="flex items-center gap-2 px-4 py-2.5 rounded-full bg-surface-container border border-white/5 hover:bg-surface-variant/20 transition-all active:scale-95">
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="add_a_photo">add_a_photo</span>
<span class="text-label-sm font-label-sm">Add Photo</span>
</button>
<button class="flex items-center gap-2 px-4 py-2.5 rounded-full bg-surface-container border border-white/5 hover:bg-surface-variant/20 transition-all active:scale-95">
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="sell">sell</span>
<span class="text-label-sm font-label-sm">Add Tag</span>
</button>
<button class="flex items-center gap-2 px-4 py-2.5 rounded-full bg-surface-container border border-white/5 hover:bg-surface-variant/20 transition-all active:scale-95">
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="location_on">location_on</span>
<span class="text-label-sm font-label-sm">Location</span>
</button>
</div>
<!-- Context Preview (Card) -->
<div class="bg-surface-container-lowest border border-white/10 rounded-lg overflow-hidden flex items-center p-stack-md gap-stack-md">
<div class="w-16 h-16 rounded-lg overflow-hidden flex-shrink-0 bg-surface-container-high">
<img alt="Adventure Preview" class="w-full h-full object-cover" data-alt="A warm, golden-hour photograph of a golden retriever dog sitting proudly on a sandy beach. The lighting is soft and cinematic, with the setting sun casting a rich amber glow across the dog's fur and the surrounding coastline. The mood is nostalgic and joyful, fitting the premium PawStreak app aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAPjomGy7nWsGcngNuA09mGm7TYxOWiS2GCeoicheufQJjD8qTHnBLbdjkxUvRiwZWBdDC9B4YvSDq_RgJ4LeSuhUzkqXTIFaerzw6cnuoye_qrxg8KL8OaQwAfb05FibD8GmvP9Fq0jifly0vKknqiz-kz4w4OuP75EMK7_FGNNfeRB3pBCPLajgSjxCNs_zzej2egIDXW_L5Lx0k9rltoRCBRGhPyJNAuphIBdgv5vFGtI1aOUHwl5ZfWRJJagVZ2_meop_T5Gs-g"/>
</div>
<div class="flex-grow">
<h3 class="text-body-md font-bold text-on-surface">Coronado Dog Beach</h3>
<p class="text-label-sm font-label-sm text-on-surface-variant">Today • 12 day streak</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</div>
<!-- Feeling Selector -->
<div class="space-y-stack-sm pt-4">
<h2 class="text-label-sm font-label-sm uppercase tracking-widest text-on-surface-variant opacity-60">How was the vibe?</h2>
<div class="grid grid-cols-4 gap-stack-md">
<!-- Feeling: Happy -->
<button class="flex flex-col items-center gap-stack-sm p-4 rounded-xl bg-surface-container-low border border-primary/30 amber-glow transition-all">
<span class="material-symbols-outlined text-primary text-[32px]" data-icon="sentiment_very_satisfied" style="font-variation-settings: 'FILL' 1;">sentiment_very_satisfied</span>
<span class="text-label-sm font-label-sm text-primary">Happy</span>
</button>
<!-- Feeling: Tired -->
<button class="flex flex-col items-center gap-stack-sm p-4 rounded-xl bg-surface-container-low border border-white/5 hover:border-white/20 transition-all opacity-60">
<span class="material-symbols-outlined text-on-surface-variant text-[32px]" data-icon="bedtime">bedtime</span>
<span class="text-label-sm font-label-sm">Tired</span>
</button>
<!-- Feeling: Excited -->
<button class="flex flex-col items-center gap-stack-sm p-4 rounded-xl bg-surface-container-low border border-white/5 hover:border-white/20 transition-all opacity-60">
<span class="material-symbols-outlined text-on-surface-variant text-[32px]" data-icon="bolt">bolt</span>
<span class="text-label-sm font-label-sm">Excited</span>
</button>
<!-- Feeling: Calm -->
<button class="flex flex-col items-center gap-stack-sm p-4 rounded-xl bg-surface-container-low border border-white/5 hover:border-white/20 transition-all opacity-60">
<span class="material-symbols-outlined text-on-surface-variant text-[32px]" data-icon="self_improvement">self_improvement</span>
<span class="text-label-sm font-label-sm">Calm</span>
</button>
</div>
</div>
</section>
<!-- Save Button Container -->
<div class="fixed bottom-0 left-0 w-full px-margin-page pb-12 pt-6 bg-gradient-to-t from-background via-background/95 to-transparent">
<button class="w-full max-w-lg mx-auto h-[64px] rounded-full bg-gradient-to-r from-primary-container to-secondary-container flex items-center justify-center gap-stack-md amber-glow active:scale-[0.98] transition-transform">
<span class="text-on-primary-container font-headline-md text-headline-md tracking-tight">Save Memory</span>
<span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</button>
<p class="text-center mt-stack-md text-label-sm font-label-sm text-on-surface-variant">Earn +50 XP for this story</p>
</div>
</main>
<!-- Bottom Navigation (Filtered: Should be hidden for transactional screens, but provided for context based on hierarchy if needed. Here, we suppress per "Task-Focused" rule) -->
</body></html>
