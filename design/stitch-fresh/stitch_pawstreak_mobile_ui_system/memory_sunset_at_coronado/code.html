            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);

            background: radial-gradient(circle, rgba(255, 189, 127, 0.15) 0%, rgba(255, 189, 127, 0) 70%);

<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-lowest/40 backdrop-blur-md text-on-surface-variant hover:opacity-80 active:scale-95 transition-all">

</button>
<div class="flex gap-stack-md">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-lowest/40 backdrop-blur-md text-on-surface-variant hover:opacity-80 active:scale-95 transition-all">
<span class="material-symbols-outlined">edit</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-lowest/40 backdrop-blur-md text-on-surface-variant hover:opacity-80 active:scale-95 transition-all">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</header>

<div class="mb-stack-lg space-y-1">
<p class="text-primary font-label-sm tracking-[0.2em] uppercase">MAY 12, 2025</p>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-white tracking-tight">Sunset at Coronado</h1>
<div class="flex items-center gap-2 text-on-surface-variant opacity-80">
<span class="material-symbols-outlined text-sm">location_on</span>
<span class="font-label-sm">San Diego, California</span>
</div>
</div>
<!-- Floating Detail Card -->
<div class="glow-surface bg-surface-container-low/80 backdrop-blur-xl border border-white/10 rounded-lg p-card-padding space-y-stack-lg mb-8">
<!-- Emotional Narrative -->
<p class="font-body-lg text-on-surface leading-relaxed italic">
                “The light was perfect today. Bailey found a new favorite driftwood stick.”
            </p>

<div class="grid grid-cols-3 gap-gutter-grid border-t border-white/5 pt-stack-md">
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-primary mb-1">distance</span>
<span class="font-headline-md text-white">3.2</span>
<span class="font-label-sm text-on-surface-variant uppercase text-[10px]">Miles</span>
</div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-primary mb-1">timer</span>

</div>

<span class="material-symbols-outlined text-primary mb-1" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="font-headline-md text-white">120</span>
<span class="font-label-sm text-on-surface-variant uppercase text-[10px]">XP Earned</span>
</div>
</div>
</div>

<button class="w-full bg-gradient-to-r from-primary-container to-secondary-container text-on-primary-fixed py-4 rounded-full font-headline-md flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(255,149,0,0.3)] hover:brightness-110 active:scale-[0.98] transition-all">
