<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0A;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .primary-gradient {
            background: linear-gradient(180deg, #FF9500 0%, #FF5E00 100%);
        }
        .amber-glow {
            box-shadow: 0 0 30px 2px rgba(255, 149, 0, 0.15);
        }
        .avatar-glow {
            filter: drop-shadow(0 0 12px rgba(255, 184, 116, 0.4));
        }
        .glass-card {
            background: rgba(32, 31, 31, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#ffbe68",
                        "surface-bright": "#3a3939",
                        "outline": "#a38d7a",
                        "on-tertiary": "#462a00",
                        "on-primary-fixed": "#2d1600",
                        "primary": "#ffbd7f",
                        "on-surface": "#e5e2e1",
                        "on-error": "#690005",
                        "surface": "#131313",
                        "primary-fixed": "#ffdcbf",
                        "inverse-surface": "#e5e2e1",
                        "tertiary-fixed": "#ffddb6",
                        "surface-tint": "#ffb874",
                        "secondary-fixed-dim": "#ffb599",
                        "surface-container-highest": "#353534",
                        "on-tertiary-fixed": "#2a1800",
                        "on-secondary-container": "#531900",
                        "surface-container-lowest": "#0e0e0e",
                        "surface-container": "#201f1f",
                        "on-primary-container": "#643700",
                        "surface-dim": "#131313",
                        "secondary-container": "#ff5e00",
                        "on-tertiary-fixed-variant": "#643f00",
                        "surface-container-low": "#1c1b1b",
                        "on-primary-fixed-variant": "#6a3b00",
                        "tertiary-container": "#e9a035",
                        "surface-container-high": "#2a2a2a",
                        "secondary": "#ffb599",
                        "on-error-container": "#ffdad6",
                        "inverse-primary": "#8c5000",
                        "error": "#ffb4ab",
                        "primary-fixed-dim": "#ffb874",
                        "error-container": "#93000a",
                        "background": "#131313",
                        "inverse-on-surface": "#313030",
                        "secondary-fixed": "#ffdbce",
                        "outline-variant": "#554334",
                        "surface-variant": "#353534",
                        "on-primary": "#4b2800",
                        "on-background": "#e5e2e1",
                        "on-surface-variant": "#dbc2ad",
                        "on-tertiary-container": "#5e3b00",
                        "on-secondary-fixed": "#370e00",
                        "on-secondary": "#5a1c00",
                        "primary-container": "#ff9500",
                        "on-secondary-fixed-variant": "#7f2b00",
                        "tertiary-fixed-dim": "#ffb95a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-lg": "24px",
                        "margin-page": "24px",
                        "gutter-grid": "16px",
                        "stack-sm": "8px",
                        "card-padding": "20px",
                        "stack-md": "16px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "display-time": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "display-time": ["48px", {"lineHeight": "1", "letterSpacing": "-0.02em", "fontWeight": "300"}],
                        "body-lg": ["17px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "body-md": ["15px", {"lineHeight": "1.5", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="docked full-width top-0 z-50 bg-surface dark:bg-surface flex justify-between items-center w-full px-margin-page h-16">
<div class="flex items-center">
<button class="text-primary dark:text-primary hover:opacity-80 transition-all duration-200 active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<div class="font-headline-md text-headline-md font-bold text-primary dark:text-primary tracking-tight">
            PawStreak
        </div>
<div class="flex items-center">
<button class="font-label-sm text-label-sm text-on-surface-variant dark:text-on-surface-variant hover:opacity-80 transition-all duration-200">
                Skip
            </button>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col items-center px-margin-page pt-stack-lg pb-stack-lg max-w-[720px] mx-auto w-full">
<!-- Avatar Section -->
<div class="relative mb-stack-lg">
<div class="w-32 h-32 rounded-full overflow-hidden border-2 border-primary-container p-1 avatar-glow">
<div class="w-full h-full rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden">
<img alt="Dog Profile Placeholder" class="w-full h-full object-cover opacity-80" data-alt="A close-up, high-fashion portrait of a charming Golden Retriever puppy with soft, warm studio lighting. The background is a deep, cinematic black that makes the puppy's golden fur and amber-colored eyes glow. The image has a premium, polished aesthetic with a shallow depth of field, emphasizing the puppy's playful yet soulful expression in a digital keepsake style." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAO0x_ZgvgpZV5n3etrbUZbDviGIP2WzrQxwYbbA23UNFbrCm3oNRDowbLHlIMUARHw8ULtZUrQMAxDwMiV032FbGzakSblBJNDskhVR_sL2aViK__3Qmp6VpqzhtGSg593YP1bvBaNr0wodYmCe6BfIB5n-K2p1FDo7VxjiO2F3lNBCa1DY7O-xEULzl4HdhgJscpWXeYDqPo3m1PM6BAgwscKuImkqOEMUgU98wAbvcOwKhJLXTLoEdzbwsuPk3sYjOThX3PzWcVi"/>
</div>
</div>
<div class="absolute bottom-0 right-0 bg-primary-container text-on-primary-container w-10 h-10 rounded-full flex items-center justify-center border-4 border-background active:scale-95 transition-transform cursor-pointer">
<span class="material-symbols-outlined text-[20px]" data-icon="add_a_photo">add_a_photo</span>
</div>
</div>
<!-- Headline -->
<div class="text-center mb-10">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Who’s your adventure buddy?</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Tell us a bit about your dog to personalize the journey.</p>
</div>
<!-- Form Fields -->
<div class="w-full space-y-gutter-grid">
<!-- Field: Dog Name -->
<div class="glass-card rounded-DEFAULT p-card-padding focus-within:ring-2 focus-within:ring-primary/50 transition-all duration-300">
<label class="font-label-sm text-label-sm text-primary mb-1 block" for="dog-name">Dog Name</label>
<input class="w-full bg-transparent border-none p-0 text-on-surface font-body-lg text-body-lg focus:ring-0 placeholder:text-on-surface-variant/40" id="dog-name" placeholder="Enter name" type="text"/>
</div>
<!-- Field: Breed -->
<div class="glass-card rounded-DEFAULT p-card-padding focus-within:ring-2 focus-within:ring-primary/50 transition-all duration-300">
<div class="flex justify-between items-center mb-1">
<label class="font-label-sm text-label-sm text-primary block" for="dog-breed">Breed</label>
<span class="font-label-sm text-[10px] text-on-surface-variant/60">OPTIONAL</span>
</div>
<input class="w-full bg-transparent border-none p-0 text-on-surface font-body-lg text-body-lg focus:ring-0 placeholder:text-on-surface-variant/40" id="dog-breed" placeholder="e.g. Golden Retriever" type="text"/>
</div>
<!-- Field: Birthday/Age -->
<div class="glass-card rounded-DEFAULT p-card-padding focus-within:ring-2 focus-within:ring-primary/50 transition-all duration-300">
<div class="flex justify-between items-center mb-1">
<label class="font-label-sm text-label-sm text-primary block" for="dog-age">Birthday or Age</label>
<span class="font-label-sm text-[10px] text-on-surface-variant/60">OPTIONAL</span>
</div>
<div class="flex items-center justify-between">
<input class="w-full bg-transparent border-none p-0 text-on-surface font-body-lg text-body-lg focus:ring-0 placeholder:text-on-surface-variant/40" id="dog-age" placeholder="How old is your buddy?" type="text"/>
<span class="material-symbols-outlined text-on-surface-variant/60" data-icon="calendar_today">calendar_today</span>
</div>
</div>
</div>
<!-- Spacer for push-to-bottom layout -->
<div class="flex-1 min-h-[40px]"></div>
<!-- Action Button -->
<div class="w-full mt-auto">
<button class="w-full primary-gradient text-on-primary-container font-headline-md text-headline-md py-4 rounded-xl shadow-lg amber-glow hover:opacity-90 active:scale-95 transition-all duration-200">
                Continue
            </button>
<p class="text-center mt-stack-md font-label-sm text-label-sm text-on-surface-variant/50">
                Step 2 of 4
            </p>
</div>
</main>
<!-- Suppressed BottomNavBar for Onboarding -->
</body></html>
