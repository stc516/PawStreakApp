<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .cinematic-gradient {
            background: linear-gradient(to bottom, rgba(10, 10, 10, 0.4), rgba(10, 10, 10, 1));
        }
        .glow-soft {
            box-shadow: 0 0 30px rgba(255, 149, 0, 0.2);
        }
        .primary-gradient-btn {
            background: linear-gradient(135deg, #FF9500 0%, #FF5E00 100%);
        }
        .inner-border {
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#0A0A0A] text-on-surface font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<!-- Background Layer: Cinematic soft focus image -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover opacity-40 blur-sm scale-105" data-alt="A cinematic, high-polish photo of a golden retriever dog walking on a sun-drenched dirt trail during the golden hour. The lighting is warm and amber, creating a soft sunset glow that silhouettes the dog's fur. The background is a soft-focus forest with hints of deep ink-black shadows, perfectly matching a premium dark mode UI aesthetic with vibrant orange highlights." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA4IhNZ9PTJWm1aV7IdOOxhfgIkZeS7sVZAdT8sFJ9pZn8MIu95AyBgtNhKHW5XRuTNobA0CjSRi9unekMNJ9tySv0oeTMJvPT2HkYo2aaogLl-kzbBCvaF1AODeHgwnn7n8fJy53y4Up7A_29_PIS7uvMGHh8DWjujQ8ilEkWNp9IXmO3fPyQBf-f9b9lsL9tpYzl5c_WjsBFEzXCHpmg_iACr-cQnwE_Q1L_avwb6XWkNANhvssO6xp-tdRXJzuO8bOkKc5PwUEDX"/>
<div class="absolute inset-0 cinematic-gradient"></div>
</div>
<!-- Layout Container -->
<div class="relative z-10 flex flex-col h-screen max-w-[720px] mx-auto px-margin-page">
<!-- Top Navigation (Shell Implementation) -->
<header class="w-full top-0 sticky flex justify-between items-center py-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary font-headline-lg-mobile text-headline-lg-mobile" data-icon="pets">pets</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">PawStreak</h1>
</div>
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-low inner-border active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Experience Canvas -->
<main class="flex-1 flex flex-col items-center justify-center space-y-12 mb-12">
<!-- Emotional State Header -->
<div class="text-center space-y-2">
<p class="font-label-sm text-label-sm text-primary tracking-widest uppercase">Active Session</p>
<h2 class="font-headline-md text-headline-md text-on-surface">Capturing a sunset walk with Bailey</h2>
</div>
<!-- Central Timer -->
<div class="relative flex flex-col items-center">
<!-- Radial Glow behind timer -->
<div class="absolute inset-0 bg-primary/10 blur-[60px] rounded-full scale-150"></div>
<div class="relative z-10 font-display-time text-[80px] leading-none tracking-tighter text-primary">
                    24:18
                </div>
<div class="mt-4 flex items-center gap-2 px-4 py-1.5 rounded-full bg-surface-container-high inner-border">
<span class="material-symbols-outlined text-tertiary text-lg" data-icon="local_fire_department" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="font-label-sm text-label-sm text-on-surface">12 Day Streak</span>
</div>
</div>
<!-- Capture Interaction -->
<div class="flex flex-col items-center gap-4">
<div class="relative">
<!-- XP Indicator -->
<div class="absolute -top-4 -right-4 bg-tertiary-container text-on-tertiary-container font-label-sm text-label-sm px-3 py-1 rounded-full shadow-lg border border-primary/20 z-20">
                        +10 XP earned
                    </div>
<button class="primary-gradient-btn w-24 h-24 rounded-full flex items-center justify-center text-on-primary shadow-2xl glow-soft active:scale-90 transition-transform duration-300">
<span class="material-symbols-outlined text-4xl" data-icon="photo_camera" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</button>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant tracking-wide uppercase">Capture Memory</span>
</div>
</main>
<!-- Action Bar: Pause and Finish -->
<footer class="pb-12 space-y-6">
<!-- Subtle Path/Route Indicator -->
<div class="w-full h-[1px] bg-outline-variant/30 relative">
<div class="absolute left-1/4 -top-1 w-2 h-2 rounded-full bg-primary glow-soft"></div>
<div class="absolute left-0 top-0 h-full w-1/4 bg-primary"></div>
</div>
<div class="flex items-center justify-between gap-4">
<button class="flex-1 py-5 rounded-lg bg-surface-container-low inner-border flex items-center justify-center gap-2 text-on-surface font-headline-md text-headline-md active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="pause">pause</span>
                    Pause
                </button>
<button class="flex-1 py-5 rounded-lg bg-surface-container-highest inner-border flex items-center justify-center gap-2 text-primary font-headline-md text-headline-md active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                    Finish
                </button>
</div>
</footer>
</div>
<!-- Hidden Bottom Nav Suppression: Navigation is suppressed as per 'Linear/Transactional' or 'Task-Focused' rule for an active session -->
</body></html>
