<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface-variant": "#353534",
            "primary-fixed-dim": "#ffb874",
            "tertiary-fixed": "#ffddb6",
            "surface-container-high": "#2a2a2a",
            "on-primary": "#4b2800",
            "secondary-fixed-dim": "#ffb599",
            "on-error-container": "#ffdad6",
            "surface-container-highest": "#353534",
            "surface-container-lowest": "#0e0e0e",
            "on-primary-fixed": "#2d1600",
            "on-tertiary-fixed-variant": "#643f00",
            "on-surface": "#e5e2e1",
            "on-background": "#e5e2e1",
            "secondary-container": "#ff5e00",
            "inverse-primary": "#8c5000",
            "error": "#ffb4ab",
            "surface-bright": "#3a3939",
            "primary": "#ffbd7f",
            "tertiary-fixed-dim": "#ffb95a",
            "primary-container": "#ff9500",
            "on-surface-variant": "#dbc2ad",
            "on-secondary-fixed-variant": "#7f2b00",
            "outline": "#a38d7a",
            "on-secondary-fixed": "#370e00",
            "on-primary-container": "#643700",
            "inverse-surface": "#e5e2e1",
            "surface-tint": "#ffb874",
            "inverse-on-surface": "#313030",
            "surface-dim": "#131313",
            "surface": "#131313",
            "secondary-fixed": "#ffdbce",
            "outline-variant": "#554334",
            "on-error": "#690005",
            "surface-container": "#201f1f",
            "error-container": "#93000a",
            "surface-container-low": "#1c1b1b",
            "primary-fixed": "#ffdcbf",
            "tertiary": "#ffbe68",
            "secondary": "#ffb599",
            "on-tertiary-fixed": "#2a1800",
            "on-secondary-container": "#531900",
            "on-tertiary": "#462a00",
            "on-tertiary-container": "#5e3b00",
            "tertiary-container": "#e9a035",
            "on-primary-fixed-variant": "#6a3b00",
            "on-secondary": "#5a1c00",
            "background": "#131313"
          },
          "borderRadius": {
            "DEFAULT": "1rem",
            "lg": "2rem",
            "xl": "3rem",
            "full": "9999px"
          },
          "spacing": {
            "stack-md": "16px",
            "stack-lg": "24px",
            "margin-page": "24px",
            "card-padding": "20px",
            "stack-sm": "8px",
            "gutter-grid": "16px"
          },
          "fontFamily": {
            "body-lg": ["Inter"],
            "headline-lg": ["Inter"],
            "headline-md": ["Inter"],
            "body-md": ["Inter"],
            "label-sm": ["Inter"],
            "headline-lg-mobile": ["Inter"],
            "display-time": ["Inter"]
          },
          "fontSize": {
            "body-lg": ["17px", {"lineHeight": "1.5", "fontWeight": "400"}],
            "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
            "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
            "body-md": ["15px", {"lineHeight": "1.5", "fontWeight": "400"}],
            "label-sm": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}],
            "headline-lg-mobile": ["28px", {"lineHeight": "1.2", "fontWeight": "700"}],
            "display-time": ["48px", {"lineHeight": "1", "letterSpacing": "-0.02em", "fontWeight": "300"}]
          }
        },
      },
    }
  </script>
<style>
    body {
      background-color: #0A0A0A;
      color: #e5e2e1;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .amber-ring-glow {
      box-shadow: 0 0 0 4px rgba(255, 184, 116, 0.1), 0 0 30px 10px rgba(255, 149, 0, 0.25);
    }
    .text-glow-amber {
      text-shadow: 0 0 15px rgba(255, 184, 116, 0.4);
    }
  </style>
</head>
<body class="flex flex-col relative overflow-hidden">
<!-- Background Imagery -->
<div class="fixed inset-0 -z-10">
<div class="absolute inset-0 bg-black/60 z-10"></div>
<img alt="Cinematic shot of a dog on a beach at sunset" class="w-full h-full object-cover opacity-40 grayscale-[0.2]" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC3sNWA-72d5eEgXKl201U87Ir_RTy5qtDNnAHONna0EnT5Iqir1o0d5Adw3egy_V2wqjHky3e5QogAk7hZ-3PHrK_fGVafWty6KqG7d5Q34RoeyMzA3FN88UX62vI5SG7KzWkjgo-xhp-jopdGUBOafrDULVqtd9XBrDQwoVYQL1_nh2fIxd4mPJ3NZt-waeE_ZFvCDdR8DtQw1u77xaWqqwIl-mpvSFaNEZvaR-TUaSVySTf_CE_sGEZW8uHL1tAYsF6dYeY7QutB"/>
</div>
<!-- Top Header Navigation -->
<header class="flex justify-between items-center w-full px-margin-page pt-6 pb-2 z-20">
<button class="w-10 h-10 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center hover:bg-white/20 transition-all active:scale-95">
<span class="material-symbols-outlined text-white" data-icon="close">close</span>
</button>
<div class="flex flex-col items-center">
<h1 class="font-headline-md text-[20px] text-white">Coronado Dog Beach</h1>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-primary text-[14px] fill-1" data-icon="light_mode" style="font-variation-settings: 'FILL' 1;">light_mode</span>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Dog Beach</span>
</div>
</div>
<button class="w-10 h-10 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center hover:bg-white/20 transition-all active:scale-95">
<span class="material-symbols-outlined text-white" data-icon="more_horiz">more_horiz</span>
</button>
</header>
<!-- Focused Center Content -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-page z-20">
<!-- Timer Section -->
<div class="flex flex-col items-center mb-16">
<div class="font-display-time text-display-time text-primary text-glow-amber tabular-nums tracking-tighter">
        00:24:18
      </div>
<div class="font-label-sm text-label-sm text-on-surface-variant mt-1 tracking-[0.2em] uppercase">
        Time on Adventure
      </div>
</div>
<!-- Primary Interaction Hub -->
<div class="flex flex-col items-center gap-8">
<button class="w-28 h-28 rounded-full bg-surface-container-highest/40 backdrop-blur-xl border-2 border-primary/40 flex items-center justify-center amber-ring-glow active:scale-90 transition-all duration-300 group">
<div class="w-20 h-20 rounded-full bg-primary/20 flex items-center justify-center group-hover:bg-primary/30 transition-colors">
<span class="material-symbols-outlined text-[44px] text-primary" data-icon="photo_camera" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</div>
</button>
<div class="text-center">
<div class="font-body-lg text-body-lg text-white mb-1">Capture a moment</div>
<div class="font-headline-md text-headline-md text-primary">+10 XP</div>
</div>
</div>
</main>
<!-- Action Controls Footer -->
<footer class="w-full px-margin-page pb-12 pt-4 z-20">
<div class="flex gap-4 items-center">
<!-- Ghost Pause Button -->
<button class="flex-1 py-4 px-6 rounded-full bg-white/5 border border-white/10 flex items-center justify-center gap-2 hover:bg-white/10 transition-all active:scale-95 backdrop-blur-sm">
<span class="material-symbols-outlined text-white text-[20px]" data-icon="pause" style="font-variation-settings: 'FILL' 1;">pause</span>
<span class="font-body-lg text-white">Pause</span>
</button>
<!-- Rounded Amber Pill Finish Button -->
<button class="flex-[1.5] py-4 px-6 rounded-full bg-gradient-to-r from-primary to-secondary-container flex items-center justify-center shadow-[0_8px_30px_rgba(255,149,0,0.3)] hover:brightness-110 transition-all active:scale-95">
<span class="font-headline-md text-on-secondary text-[17px] font-bold">Finish</span>
</button>
</div>
</footer>
</body></html>
